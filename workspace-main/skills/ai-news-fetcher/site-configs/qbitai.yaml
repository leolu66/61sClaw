# 量子位 - AI 科技媒体（列表页提取模式）
# 采集策略：直接从列表页提取所有字段，无需访问详情页

_schema_version: "1.0"

site:
  name: "量子位"
  base_url: "https://www.qbitai.com"
  enabled: true
  config_version: "2024-03-09-v2"
  
  request:
    headers:
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    timeout: 30
    delay: 2

# 列表页配置 - 直接提取完整信息
list_page:
  url: "https://www.qbitai.com"
  pagination: "https://www.qbitai.com/page/{page}"
  page_start: 1
  page_max: 3
  
  item_selector:
    type: "css"
    value: "div.content > div > div.picture_text"  # 每条新闻卡片
  
  fields:
    # 详情链接（用于去重和溯源）
    link:
      type: "xpath"
      value: ".//div[@class='text_box']/h4/a/@href"
      transform: "absolute_url"
    
    # 标题
    title:
      type: "xpath"
      value: ".//div[@class='text_box']/h4/a/text()"
      required: true
    
    # 摘要
    summary:
      type: "xpath"
      value: ".//div[@class='text_box']/p[2]/text()"
      default: ""
    
    # 作者（可能为空）
    author:
      type: "xpath"
      value: ".//div[@class='text_box']/div/span[contains(@class, 'author')]/a/text()"
      default: "量子位"
    
    # 发布时间（相对时间如"56分钟前"）
    publish_time:
      type: "xpath"
      value: ".//div[@class='text_box']/div/span[contains(@class, 'time')]/text()"
      # 注意：这里获取的是"56分钟前"这样的相对时间

dedup:
  field: "url"
  method: "url_normalize"
