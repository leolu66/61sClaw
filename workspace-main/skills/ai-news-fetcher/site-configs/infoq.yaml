# InfoQ AI 简报
# https://www.infoq.cn/aibriefs
# 特殊格式：数据在 Vue SSR JSON 中，需要特殊解析

_schema_version: "1.0"

site:
  name: "InfoQ AI简报"
  base_url: "https://www.infoq.cn"
  enabled: true
  config_version: "2024-03-09-v1"
  
  request:
    headers:
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
      Accept: "text/html,application/xhtml+xml"
    timeout: 30
    delay: 2

# InfoQ 使用 Vue SSR，数据在 <script type="application/json"> 中
# 需要自定义提取逻辑，这里标记为特殊类型
list_page:
  url: "https://www.infoq.cn/aibriefs"
  
  item_selector:
    type: "json_ssr"
    value: "aibriefsList.list"  # JSON 路径
    
  fields:
    title:
      type: "json_ssr_field"
      value: "title"
      required: true
    
    summary:
      type: "json_ssr_field"
      value: "description"
      default: ""
    
    link:
      type: "json_ssr_field"
      value: "original_link"
      transform: "absolute_url"
    
    author:
      type: "constant"
      value: "InfoQ"
    
    # 时间戳需要转换
    publish_time:
      type: "json_ssr_field"
      value: "collect_time"
      transform: "timestamp_to_iso"

dedup:
  field: "url"
  method: "url_normalize"
