# 量子位 (qbitai.yaml)
site:
  name: "量子位"
  base_url: "https://www.qbitai.com"
  enabled: true

fetch:
  method: "requests"
  encoding: "utf-8"
  strategy:
    requests_per_minute: 10
    delay_between_requests: 6
    max_retries: 3
    timeout: 15

selectors:
  container:
    css: "body > div.main.index_page > div.content > div"
    xpath: "/html/body/div[2]/div[1]/div"
  
  item: "div"
  
  fields:
    title:
      primary:
        selector: ".text_box > h4 > a"
        attribute: "text"
      example: "卡帕西开源Agent自进化训练框架，5分钟一轮实验，48h内揽星9.5k"
      
    link:
      primary:
        selector: ".text_box > h4 > a"
        attribute: "href"
      transform: "absolute_url"
      example: "https://www.qbitai.com/2026/03/384953.html"
      
    summary:
      primary:
        selector: ".text_box p"
        attribute: "text"
        max_length: 200
      example: "下一步要模拟整个博士社群"
      
    author:
      primary:
        selector: ".text_box .author a"
        attribute: "text"
      example: "闻乐"
      
    time:
      primary:
        selector: ".text_box .time"
        attribute: "text"
      example: "56分钟前"

anti_crawl:
  detected: false
  status: "normal"

filters:
  min_title_length: 10

extractor: "default"
