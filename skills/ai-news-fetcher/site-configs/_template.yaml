# ==================== 站点配置模板 ====================
# 
# 复制此文件创建新站点配置：
# cp _template.yaml your-site.yaml
#
# 然后修改以下内容：
#   1. site 部分的基本信息
#   2. list_page 部分的列表页配置
#   3. detail_page 部分的详情页配置
#
# 使用命令行工具测试配置：
# python spider_cli.py test your-site
#
# =====================================================

_schema_version: "1.0"  # 配置模式版本，不要修改

site:
  # 站点名称（显示用）
  name: "示例站点"
  
  # 基础 URL（用于拼接相对路径）
  base_url: "https://example.com"
  
  # 是否启用此站点
  enabled: false  # 模板默认禁用，复制后改为 true
  
  # 配置版本（用于追踪网站改版）
  # 当网站结构变化时，升级版本号并更新配置
  config_version: "2024-01-01-v1"
  
  # 请求配置
  request:
    # 请求头
    headers:
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
      Accept: "text/html,application/xhtml+xml"
      Accept-Language: "zh-CN,zh;q=0.9,en;q=0.8"
    
    # 请求超时（秒）
    timeout: 30
    
    # 重试次数
    retry: 3
    
    # 请求间隔（秒，防止请求过快被封）
    delay: 2

# ==================== 列表页配置 ====================
# 配置如何从列表页获取新闻条目和详情链接
# 
# 支持的采集模式：
# 1. 列表页模式（list_page）：从列表页抓取详情链接，再逐个访问详情页
# 2. API 模式（api）：直接调用 API 获取数据（待实现）
# ===================================================

list_page:
  # 列表页 URL
  url: "https://example.com/news"
  
  # 分页配置（可选，单页则不需要）
  # 使用 {page} 作为页码占位符
  # pagination: "https://example.com/news?page={page}"
  # page_start: 1      # 起始页码
  # page_max: 5        # 最大采集页数
  
  # 列表项选择器 - 定位每一条新闻
  # 类型: xpath / css
  item_selector:
    type: "xpath"
    value: "//div[@class='news-item']"
  
  # 列表页字段提取
  fields:
    # 详情页链接（必需）
    link:
      type: "xpath"
      value: ".//a[@class='title']/@href"
      # transform: "absolute_url"  # 相对路径转绝对路径
    
    # 发布时间（可选，有些列表页就有）
    # publish_time:
    #   type: "xpath"
    #   value: ".//span[@class='time']/text()"
    #   transform: "parse_datetime"

# ==================== 详情页配置 ====================
# 配置如何从详情页提取新闻内容
# ===================================================

detail_page:
  fields:
    # 新闻标题（必需）
    title:
      type: "xpath"
      value: "//h1[@class='article-title']/text()"
      required: true  # 必填字段，提取失败会报错
    
    # 新闻摘要/简介
    summary:
      type: "xpath"
      value: "//div[@class='article-summary']//text()"
      transform: "join_text"  # 合并多段文本
      default: ""  # 默认值
    
    # 作者
    author:
      type: "xpath"
      value: "//span[@class='author-name']/text()"
      default: "未知作者"
    
    # 发布时间
    publish_time:
      type: "xpath"
      value: "//time[@class='publish-time']/@datetime"
      transform: "parse_datetime"
    
    # 更新时间（如果没有发布时间，可用这个替代）
    update_time:
      type: "css"
      value: "time.update::attr(datetime)"
      transform: "parse_datetime"
    
    # 正文内容（可选）
    # content:
    #   type: "xpath"
    #   value: "//div[@class='article-content']"
    #   transform: "strip_html"

# ==================== 去重配置 ====================
dedup:
  # 去重字段
  field: "url"
  
  # 去重方法
  # url_normalize: URL 归一化（去掉?utm_source等参数）
  # exact: 精确匹配
  method: "url_normalize"

# ==================== 字段提取语法参考 ====================
#
# 【XPath 选择器】
# - 文本: //h1/text()
# - 属性: //a/@href
# - 包含 class: //div[contains(@class, 'article')]
# - 第 N 个: (//div[@class='item'])[1]
# - 子元素: .//span（相对当前元素）
#
# 【CSS 选择器】
# - 元素: h1.article-title
# - 属性: a::attr(href)
# - 文本: span.author::text
# - 子元素: .content > p
#
# 【正则表达式】
# - type: "regex"
# - value: "发布时间：(\d{4}-\d{2}-\d{2})"
#
# 【数据转换器】
# - absolute_url: 相对路径转绝对路径
# - join_text: 合并多段文本
# - strip_html: 去除 HTML 标签
# - parse_datetime: 解析日期时间
# - timestamp_to_iso: 时间戳转 ISO 格式
# - extract_number: 提取数字
# - clean_whitespace: 清理多余空白
#
# =======================================================
