# 极客公园 - AI 新浪潮观察专栏
# https://www.geekpark.net/column/304

_schema_version: "1.0"

site:
  name: "极客公园"
  base_url: "https://www.geekpark.net"
  enabled: true
  config_version: "2026-03-09-v1"
  
  request:
    headers:
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
    timeout: 30
    delay: 2
    use_playwright: true  # 使用 Playwright 渲染

list_page:
  url: "https://www.geekpark.net/column/304"
  pagination: "https://www.geekpark.net/column/304?page={page}"
  page_start: 1
  page_max: 2
  
  item_selector:
    type: "css"
    value: "article"
  
  fields:
    link:
      type: "css"
      value: "a[href^='/news/']"
      attribute: "href"
      transform: "absolute_url"
    
    title:
      type: "css"
      value: "h3"
      transform: "text"
    
    summary:
      type: "css"
      value: "p"
      transform: "text"
      default: ""
    
    publish_time:
      type: "css"
      value: ".article-time"
      transform: "text"
      default: ""
    
    author:
      type: "css"
      value: ".article-author"
      transform: "text"
      default: "极客公园"

dedup:
  field: "url"
  method: "url_normalize"
