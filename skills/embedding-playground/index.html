<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Embedding Playground</title><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg-primary:#1a1a2e;--bg-card:#16213e;--border-color:#0f3460;--text-primary:#eee;--text-secondary:#aaa;--accent:#e94560;--accent-hover:#ff6b6b;--success:#4ECDC4;--danger:#FF6B6B;--warning:#FFE66D}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;line-height:1.6}.container{max-width:1200px;margin:0 auto;padding:20px}header{text-align:center;padding:30px 0;border-bottom:1px solid var(--border-color);margin-bottom:20px}header h1{font-size:2rem;color:var(--accent);margin-bottom:10px}header p{color:var(--text-secondary)}.tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:20px;border-bottom:2px solid var(--border-color)}.tab-btn{padding:12px 20px;background:transparent;border:none;color:var(--text-secondary);cursor:pointer;font-size:14px;transition:all .3s;border-bottom:2px solid transparent;margin-bottom:-2px}.tab-btn:hover{color:var(--text-primary)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}.tab-content{display:none;animation:fadeIn .3s}.tab-content.active{display:block}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:20px;margin-bottom:20px}.card-title{font-size:1.2rem;margin-bottom:15px;color:var(--accent)}textarea{width:100%;min-height:120px;padding:12px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:14px;resize:vertical;font-family:inherit}textarea:focus{outline:none;border-color:var(--accent)}input[type="text"],input[type="number"]{width:100%;padding:10px 12px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:6px;color:var(--text-primary);font-size:14px}input:focus{outline:none;border-color:var(--accent)}button{padding:10px 20px;background:var(--accent);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:14px;transition:background .3s}button:hover{background:var(--accent-hover)}button:disabled{background:#555;cursor:not-allowed}button.secondary{background:var(--border-color)}button.secondary:hover{background:#1a4a7a}button.danger{background:var(--danger)}button.danger:hover{background:#ff4444}table{width:100%;border-collapse:collapse;margin-top:15px}th,td{padding:12px;text-align:left;border-bottom:1px solid var(--border-color)}th{color:var(--accent);font-weight:600;background:rgba(233,69,96,.1)}tr:hover{background:rgba(255,255,255,.02)}.checkbox-group{display:flex;flex-wrap:wrap;gap:15px;margin:15px 0}.checkbox-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-primary);border-radius:6px;cursor:pointer;transition:background .2s}.checkbox-item:hover{background:var(--border-color)}.checkbox-item input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent)}.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;justify-content:center;align-items:center}.modal-overlay.active{display:flex}.modal{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:25px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.modal-header h3{color:var(--accent)}.modal-close{background:none;border:none;color:var(--text-secondary);font-size:24px;cursor:pointer;padding:0;width:30px;height:30px}.form-group{margin-bottom:15px}.form-group label{display:block;margin-bottom:5px;color:var(--text-secondary);font-size:13px}.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}.result-card{background:var(--bg-primary);border:1px solid var(--border-color);border-radius:8px;padding:15px;margin-bottom:15px}.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.result-title{font-weight:600;color:var(--accent)}.result-meta{font-size:12px;color:var(--text-secondary)}.vector-preview{font-family:'Courier New',monospace;font-size:12px;background:rgba(0,0,0,.3);padding:10px;border-radius:6px;overflow-x:auto;margin:10px 0}.copy-btn{padding:6px 12px;font-size:12px}.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}.badge-success{background:rgba(78,205,196,.2);color:var(--success)}.badge-danger{background:rgba(255,107,107,.2);color:var(--danger)}.badge-warning{background:rgba(255,230,109,.2);color:var(--warning)}.action-btns{display:flex;gap:5px}.action-btns button{padding:5px 10px;font-size:12px}.comparison-table th,.comparison-table td{text-align:center;font-family:'Courier New',monospace}.comparison-table .positive{color:var(--success)}.comparison-table .negative{color:var(--danger)}.comparison-table .stats-row{background:rgba(233,69,96,.1);font-weight:600}.similarity-matrix{overflow-x:auto}.similarity-matrix td{text-align:center;font-family:'Courier New',monospace;font-size:13px}.similarity-matrix .cell{padding:8px 12px;border-radius:4px}.similarity-matrix .highlight-max{border:2px solid var(--success)}.similarity-matrix .highlight-min{border:2px solid var(--danger)}.viz-controls{display:flex;gap:10px;margin-bottom:15px}.viz-controls button{flex:1}.viz-controls button.active{background:var(--success)}.viz-container{width:100%;height:500px;border:1px solid var(--border-color);border-radius:8px;overflow:hidden}.viz-container iframe{width:100%;height:100%;border:none}.loading{text-align:center;padding:40px;color:var(--text-secondary)}.spinner{display:inline-block;width:40px;height:40px;border:3px solid var(--border-color);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:15px}@keyframes spin{to{transform:rotate(360deg)}}.error-message{background:rgba(255,107,107,.1);border:1px solid var(--danger);color:var(--danger);padding:12px;border-radius:6px;margin:10px 0}@media(max-width:768px){.container{padding:10px}header h1{font-size:1.5rem}.tabs{justify-content:center}.tab-btn{padding:10px 15px;font-size:13px}table{font-size:12px}th,td{padding:8px}.checkbox-group{flex-direction:column}.viz-container{height:350px}}.toggle-switch{position:relative;display:inline-block;width:44px;height:24px}.toggle-switch input{opacity:0;width:0;height:0}.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#555;transition:.3s;border-radius:24px}.toggle-slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:#fff;transition:.3s;border-radius:50%}input:checked+.toggle-slider{background-color:var(--success)}input:checked+.toggle-slider:before{transform:translateX(20px)}</style></head><body><div class="container"><header><h1>Embedding Playground</h1><p>探索、对比和可视化文本嵌入向量</p></header><div class="tabs"><button class="tab-btn active" data-tab="models">模型管理</button><button class="tab-btn" data-tab="generate">向量生成</button><button class="tab-btn" data-tab="compare">维度对比</button><button class="tab-btn" data-tab="similarity">相似度分析</button><button class="tab-btn" data-tab="visualize">可视化</button></div><div id="models" class="tab-content active"><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px"><h2 class="card-title">模型列表</h2><button onclick="openModelModal()">+ 添加模型</button></div><div id="models-table-container"><div class="loading"><div class="spinner"></div><p>加载中...</p></div></div></div></div><div id="generate" class="tab-content"><div class="card"><h2 class="card-title">生成向量</h2><div class="form-group"><label>输入文本</label><textarea id="generate-text" placeholder="在此输入要生成嵌入向量的文本..."></textarea></div><div class="form-group"><label>选择模型</label><div id="generate-model-checkboxes" class="checkbox-group"><div class="loading"><div class="spinner" style="width:20px;height:20px"></div></div></div></div><button onclick="generateEmbeddings()" id="generate-btn">生成向量</button><div id="generate-results"></div></div></div><div id="compare" class="tab-content"><div class="card"><h2 class="card-title">维度对比</h2><div class="form-group"><label>输入文本</label><textarea id="compare-text" placeholder="在此输入要对比的文本..."></textarea></div><div class="form-group"><label>选择模型（至少2个）</label><div id="compare-model-checkboxes" class="checkbox-group"><div class="loading"><div class="spinner" style="width:20px;height:20px"></div></div></div></div><button onclick="compareDimensions()" id="compare-btn">生成对比</button><div id="compare-results"></div></div></div><div id="similarity" class="tab-content"><div class="card"><h2 class="card-title">相似度分析</h2><div class="form-group"><label>输入多条文本（每行一条，至少2条）</label><textarea id="similarity-texts" placeholder="文本1&#10;文本2&#10;文本3..."></textarea></div><div class="form-group"><label>选择模型</label><div id="similarity-model-checkboxes" class="checkbox-group"><div class="loading"><div class="spinner" style="width:20px;height:20px"></div></div></div></div><button onclick="calculateSimilarity()" id="similarity-btn">计算相似度</button><div id="similarity-results"></div></div></div><div id="visualize" class="tab-content"><div class="card"><h2 class="card-title">向量可视化</h2><div class="form-group"><label>输入多条文本（每行一条）</label><textarea id="viz-texts" placeholder="文本1&#10;文本2&#10;文本3..."></textarea></div><div class="form-group"><label>选择模型</label><div id="viz-model-checkboxes" class="checkbox-group"><div class="loading"><div class="spinner" style="width:20px;height:20px"></div></div></div></div><div class="form-group"><label>降维算法</label><select id="viz-algorithm" style="width:100%;padding:10px 12px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:6px;color:var(--text-primary);font-size:14px;"><option value="pca">PCA (线性降维，快)</option><option value="tsne">t-SNE (非线性，保留局部结构)</option><option value="umap">UMAP (平衡全局+局部结构，推荐)</option></select></div><div class="viz-controls"><button id="viz-2d" class="active" onclick="setVizDims(2)">2D 视图</button><button id="viz-3d" onclick="setVizDims(3)">3D 视图</button></div><button onclick="generateVisualization()" id="viz-btn">生成图表</button><div id="viz-results" style="margin-top:20px"></div></div></div></div><div id="model-modal" class="modal-overlay"><div class="modal"><div class="modal-header"><h3 id="modal-title">添加模型</h3><button class="modal-close" onclick="closeModelModal()">x</button></div><form id="model-form" onsubmit="saveModel(event)"><input type="hidden" id="model-id"><div class="form-group"><label>名称 *</label><input type="text" id="model-name" required></div><div class="form-group"><label>API URL</label><input type="text" id="model-api-url" placeholder="https://api.example.com/v1/embeddings"></div><div class="form-group"><label>API Key</label><input type="text" id="model-api-key" placeholder="sk-..."></div><div class="form-group"><label>模型ID *</label><input type="text" id="model-model-id" required></div><div class="form-group"><label>维度</label><input type="number" id="model-dimension" placeholder="1536"></div><div class="form-group"><label>价格（每百万token）</label><input type="number" id="model-price" step="0.01" placeholder="0.1"></div><div class="form-group"><label>描述</label><input type="text" id="model-description"></div><div class="form-actions"><button type="button" class="secondary" onclick="closeModelModal()">取消</button><button type="submit">保存</button></div></form></div></div><script>let models=[];let currentVizDims=2;document.addEventListener('DOMContentLoaded',()=>{loadModels();setupTabs()});function setupTabs(){document.querySelectorAll('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>{const tabId=btn.dataset.tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.getElementById(tabId).classList.add('active')})})}async function loadModels(){try{const res=await fetch('/api/models');models=await res.json();renderModelsTable();renderModelCheckboxes()}catch(err){console.error('Failed to load models:',err);document.getElementById('models-table-container').innerHTML=`<div class="error-message">加载模型失败: ${err.message}</div>`}}function renderModelsTable(){const container=document.getElementById('models-table-container');if(models.length===0){container.innerHTML='<p style="text-align:center;color:var(--text-secondary)">暂无模型</p>';return}const html=`<table><thead><tr><th>序号</th><th>名称</th><th>模型ID</th><th>维度</th><th>价格</th><th>状态</th><th>操作</th></tr></thead><tbody>`+models.map((m,i)=>`<tr><td>${i+1}</td><td>${escapeHtml(m.name)}</td><td><code>${escapeHtml(m.model_id)}</code></td><td>${m.dimension||'-'}</td><td>${m.price_per_mtokens||'-'}</td><td><label class="toggle-switch"><input type="checkbox" ${m.is_active?'checked':''} onchange="toggleModelActive(${m.id},this.checked)"><span class="toggle-slider"></span></label>${m.is_active?'<span class="badge badge-success">启用</span>':'<span class="badge badge-danger">禁用</span>'}${m.is_preset?'<span class="badge badge-warning">预置</span>':''}</td><td><div class="action-btns"><button onclick="editModel(${m.id})">编辑</button><button class="danger" onclick="deleteModel(${m.id})" ${m.is_preset?'disabled':''}>删除</button></div></td></tr>`).join('')+`</tbody></table>`;container.innerHTML=html}function renderModelCheckboxes(){const activeModels=models.filter(m=>m.is_active);let html='';for(let k=0;k<activeModels.length;k++){const m=activeModels[k];html+='<label class="checkbox-item"><input type="checkbox" value="'+m.id+'" data-name="'+escapeHtml(m.name)+'" data-dim="'+m.dimension+'"><span>'+escapeHtml(m.name)+' ('+m.dimension+'\\u7ef4)</span></label>'}const tabs=['generate','compare','similarity','viz'];for(let t=0;t<tabs.length;t++){const tab=tabs[t];const container=document.getElementById(tab+'-model-checkboxes');if(!container)continue;if(activeModels.length===0){container.innerHTML='<p style="color:var(--text-secondary)">没有可用的模型</p>'}else{container.innerHTML=html;if(tab==='similarity' || tab==='viz'){const cbs=container.querySelectorAll('input[type="checkbox"]');for(let c=0;c<cbs.length;c++){cbs[c].addEventListener('change',function(){if(this.checked){for(let o=0;o<cbs.length;o++){if(cbs[o]!==this)cbs[o].checked=false}}})}}}}}function openModelModal(model=null){const modal=document.getElementById('model-modal');const title=document.getElementById('modal-title');const form=document.getElementById('model-form');if(model){title.textContent='编辑模型';document.getElementById('model-id').value=model.id;document.getElementById('model-name').value=model.name;document.getElementById('model-api-url').value=model.api_url||'';document.getElementById('model-api-key').value=model.api_key||'';document.getElementById('model-model-id').value=model.model_id;document.getElementById('model-dimension').value=model.dimension||'';document.getElementById('model-price').value=model.price_per_mtokens||'';document.getElementById('model-description').value=model.description||''}else{title.textContent='添加模型';form.reset();document.getElementById('model-id').value=''}modal.classList.add('active')}function closeModelModal(){document.getElementById('model-modal').classList.remove('active')}async function saveModel(e){e.preventDefault();const id=document.getElementById('model-id').value;const data={name:document.getElementById('model-name').value,api_url:document.getElementById('model-api-url').value,api_key:document.getElementById('model-api-key').value,model_id:document.getElementById('model-model-id').value,dimension:parseInt(document.getElementById('model-dimension').value)||0,price_per_mtokens:parseFloat(document.getElementById('model-price').value)||0,description:document.getElementById('model-description').value};try{const url=id?`/api/models/${id}`:'/api/models';const method=id?'PUT':'POST';const res=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});if(!res.ok)throw new Error('保存失败');closeModelModal();loadModels()}catch(err){alert('保存失败: '+err.message)}}function editModel(id){const model=models.find(m=>m.id===id);if(model)openModelModal(model)}async function deleteModel(id){const model=models.find(m=>m.id===id);if(!model)return;if(model.is_preset){alert('预置模型不能删除，只能禁用');return}if(!confirm('确定要删除这个模型吗？'))return;try{const res=await fetch(`/api/models/${id}`,{method:'DELETE'});if(!res.ok)throw new Error('删除失败');loadModels()}catch(err){alert('删除失败: '+err.message)}}async function toggleModelActive(id,isActive){try{const res=await fetch(`/api/models/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({is_active:isActive})});if(!res.ok)throw new Error('更新失败');loadModels()}catch(err){alert('更新失败: '+err.message)}}async function generateEmbeddings(){const text=document.getElementById('generate-text').value.trim();if(!text){alert('请输入文本');return}const checkboxes=document.querySelectorAll('#generate-model-checkboxes input:checked');const modelIds=Array.from(checkboxes).map(cb=>parseInt(cb.value));if(modelIds.length===0){alert('请至少选择一个模型');return}const btn=document.getElementById('generate-btn');const resultsDiv=document.getElementById('generate-results');btn.disabled=true;resultsDiv.innerHTML='<div class="loading"><div class="spinner"></div><p>生成中...</p></div>';try{const res=await fetch('/api/embed',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,modelIds})});if(!res.ok)throw new Error('生成失败');const data=await res.json();renderGenerateResults(data.results)}catch(err){resultsDiv.innerHTML=`<div class="error-message">错误: ${err.message}</div>`}finally{btn.disabled=false}}let lastEmbedResults=[];function renderGenerateResults(results){lastEmbedResults=results;const container=document.getElementById('generate-results');const html=results.map((r,idx)=>{if(r.error){return`<div class="result-card"><div class="result-header"><span class="result-title">${escapeHtml(r.modelName)}</span><span class="badge badge-danger">错误</span></div><div class="error-message">${escapeHtml(r.error)}</div></div>`}const vectorStr=JSON.stringify(r.vectorPreview);return`<div class="result-card"><div class="result-header"><span class="result-title">${escapeHtml(r.modelName)}</span><span class="result-meta">${r.dimension}维 | ${r.duration}ms${r.fromCache?' | 缓存':''}</span></div><div class="vector-preview">${vectorStr}</div><button class="copy-btn" onclick="copyVectorByIdx(${idx})">Copy Full Vector</button></div>`}).join('');container.innerHTML=html}async function compareDimensions(){const text=document.getElementById('compare-text').value.trim();if(!text){alert('请输入文本');return}const checkboxes=document.querySelectorAll('#compare-model-checkboxes input:checked');const modelIds=Array.from(checkboxes).map(cb=>parseInt(cb.value));if(modelIds.length<2){alert('请至少选择2个模型进行对比');return}const btn=document.getElementById('compare-btn');const resultsDiv=document.getElementById('compare-results');btn.disabled=true;resultsDiv.innerHTML='<div class="loading"><div class="spinner"></div><p>生成中...</p></div>';try{const res=await fetch('/api/embed',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,modelIds})});if(!res.ok)throw new Error('生成失败');const data=await res.json();renderCompareResults(data.results)}catch(err){resultsDiv.innerHTML=`<div class="error-message">错误: ${err.message}</div>`}finally{btn.disabled=false}}function renderCompareResults(results){const container=document.getElementById('compare-results');const validResults=results.filter(r=>!r.error&&r.vector);if(validResults.length===0){container.innerHTML='<div class="error-message">没有有效的向量结果</div>';return}const dimsToShow=10;let html='<table class="comparison-table"><thead><tr><th>维度</th>'+validResults.map(r=>`<th>${escapeHtml(r.modelName)}</th>`).join('')+'</tr></thead><tbody>';for(let i=0;i<dimsToShow;i++){html+=`<tr><td>Dim ${i}</td>`+validResults.map(r=>{const val=r.vector[i]||0;const className=val>=0?'positive':'negative';return`<td class="${className}">${val.toFixed(6)}</td>`}).join('')+'</tr>'}html+='<tr class="stats-row"><td>L2范数</td>'+validResults.map(r=>{const l2=Math.sqrt(r.vector.reduce((sum,v)=>sum+v*v,0));return`<td>${l2.toFixed(4)}</td>`}).join('')+'</tr>';html+='<tr class="stats-row"><td>均值</td>'+validResults.map(r=>{const mean=r.vector.reduce((sum,v)=>sum+v,0)/r.vector.length;return`<td>${mean.toFixed(6)}</td>`}).join('')+'</tr>';html+='<tr class="stats-row"><td>标准差</td>'+validResults.map(r=>{const mean=r.vector.reduce((sum,v)=>sum+v,0)/r.vector.length;const variance=r.vector.reduce((sum,v)=>sum+Math.pow(v-mean,2),0)/r.vector.length;return`<td>${Math.sqrt(variance).toFixed(6)}</td>`}).join('')+'</tr>';html+='<tr class="stats-row"><td>总维度</td>'+validResults.map(r=>`<td>${r.dimension}</td>`).join('')+'</tr>';html+='</tbody></table>';container.innerHTML=html}async function calculateSimilarity(){const textsStr=document.getElementById('similarity-texts').value.trim();if(!textsStr){alert('请输入文本');return}const texts=textsStr.split('\n').filter(t=>t.trim());if(texts.length<2){alert('请至少输入2条文本');return}const checkboxes=document.querySelectorAll('#similarity-model-checkboxes input:checked');const modelIds=Array.from(checkboxes).map(cb=>parseInt(cb.value));if(modelIds.length===0){alert('请选择一个模型');return}if(modelIds.length>1){alert('请只选择一个模型');return}const btn=document.getElementById('similarity-btn');const resultsDiv=document.getElementById('similarity-results');btn.disabled=true;resultsDiv.innerHTML='<div class="loading"><div class="spinner"></div><p>计算中...</p></div>';try{const res=await fetch('/api/similarity',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texts,modelId:modelIds[0]})});if(!res.ok)throw new Error('计算失败');const data=await res.json();renderSimilarityResults(data)}catch(err){resultsDiv.innerHTML=`<div class="error-message">错误: ${err.message}</div>`}finally{btn.disabled=false}}function renderSimilarityResults(data){const container=document.getElementById('similarity-results');const{matrix,labels,min,max}=data;const n=matrix.length;let html='<div class="similarity-matrix"><table><thead><tr><th></th>'+labels.map((l,i)=>`<th>${escapeHtml(l.substring(0,20))}</th>`).join('')+'</tr></thead><tbody>';for(let i=0;i<n;i++){html+=`<tr><th>${escapeHtml(labels[i].substring(0,20))}</th>`;for(let j=0;j<n;j++){const val=matrix[i][j];let cellClass='cell';if(min&&min.pair[0]===i&&min.pair[1]===j||min&&min.pair[0]===j&&min.pair[1]===i){cellClass+=' highlight-min'}if(max&&max.pair[0]===i&&max.pair[1]===j||max&&max.pair[0]===j&&max.pair[1]===i){cellClass+=' highlight-max'}const hue=val*120;const color=`hsl(${hue},70%,50%)`;html+=`<td><div class="${cellClass}" style="background:rgba(${val>=0.5?'255,100,100':'100,100,255'},${Math.abs(val-0.5)*0.3})">${val.toFixed(3)}</div></td>`}html+='</tr>'}html+='</tbody></table></div>';if(max){html+=`<p style="margin-top:15px"><span class="badge badge-success">最高相似度</span> ${escapeHtml(labels[max.pair[0]].substring(0,30))} ↔ ${escapeHtml(labels[max.pair[1]].substring(0,30))} = ${max.value.toFixed(4)}</p>`}if(min){html+=`<p><span class="badge badge-danger">最低相似度</span> ${escapeHtml(labels[min.pair[0]].substring(0,30))} ↔ ${escapeHtml(labels[min.pair[1]].substring(0,30))} = ${min.value.toFixed(4)}</p>`}container.innerHTML=html}function setVizDims(dims){currentVizDims=dims;document.getElementById('viz-2d').classList.toggle('active',dims===2);document.getElementById('viz-3d').classList.toggle('active',dims===3)}async function generateVisualization(){const textsStr=document.getElementById('viz-texts').value.trim();if(!textsStr){alert('请输入文本');return}const texts=textsStr.split('\n').filter(t=>t.trim());if(texts.length===0){alert('请至少输入1条文本');return}const checkboxes=document.querySelectorAll('#viz-model-checkboxes input:checked');const modelIds=Array.from(checkboxes).map(cb=>parseInt(cb.value));if(modelIds.length===0){alert('请至少选择一个模型');return}const btn=document.getElementById('viz-btn');const resultsDiv=document.getElementById('viz-results');btn.disabled=true;resultsDiv.innerHTML='<div class="loading"><div class="spinner"></div><p>生成中...</p></div>';try{const res=await fetch('/api/visualize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texts,modelIds,dims:currentVizDims,algorithm:document.getElementById('viz-algorithm').value})});if(!res.ok)throw new Error('生成失败');const data=await res.json();resultsDiv.innerHTML=`<div class="viz-container"><iframe srcdoc="${escapeHtml(data.html)}"></iframe></div>`}catch(err){resultsDiv.innerHTML=`<div class="error-message">错误: ${err.message}</div>`}finally{btn.disabled=false}}function copyVectorByIdx(idx){if(lastEmbedResults[idx]&&lastEmbedResults[idx].vector){navigator.clipboard.writeText(JSON.stringify(lastEmbedResults[idx].vector)).then(()=>alert('向量已复制到剪贴板')).catch(()=>alert('复制失败'))}}function escapeHtml(text){if(!text)return'';return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}</script></body></html>
