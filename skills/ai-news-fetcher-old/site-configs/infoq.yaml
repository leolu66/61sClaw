# InfoQ (infoq.yaml)
site:
  name: "InfoQ"
  base_url: "https://www.infoq.cn"
  enabled: true

fetch:
  method: "playwright"  # InfoQ使用Vue/Nuxt，需要动态渲染
  encoding: "utf-8"
  strategy:
    requests_per_minute: 10
    delay_between_requests: 6
    max_retries: 3
    timeout: 30
  
  playwright:
    headless: true
    wait_for: "networkidle"
    wait_timeout: 30000

selectors:
  container:
    css: "._aibriefs-list_u5zau_105"
    xpath: "//div[contains(@class,'_aibriefs-list_')]"
  
  item: "._content-item_gicxd_98 > div"
  
  fields:
    title:
      primary:
        selector: "._title_ndgee_69"
        attribute: "text"
      example: "LangChain发布智能体可观测性新指南，探讨生产环境监控挑战"
      
    link:
      primary:
        selector: "a"
        attribute: "href"
      transform: "absolute_url"
      example: "https://www.infoq.cn/article/xxxxx"
      
    summary:
      primary:
        selector: "._desc_ndgee_165"
        attribute: "text"
        max_length: 300
      example: "近日，LangChain发布了一篇关于智能体（Agent）可观测性的新概念指南。文中观点认为，与传统软件不同，智能体面临自然语言输入无界、大语言模型（LLM）对提示词细微变化敏感等挑战，因此其生产环境监控需要不同的方法。"
      
    time:
      primary:
        selector: "._item-time_ndgee_82"
        attribute: "text"
      example: "8 小时前"

# InfoQ特殊结构：按天分区域，需要特殊处理
structure:
  type: "grouped_by_date"
  date_sections:
    - name: "今天"
      selector: "._aibriefs-list_u5zau_105 > div:nth-child(1)"
    - name: "昨天"
      selector: "._aibriefs-list_u5zau_105 > div:nth-child(2)"
    - name: "前天"
      selector: "._aibriefs-list_u5zau_105 > div:nth-child(3)"
    - name: "更早"
      selector: "._aibriefs-list_u5zau_105 > div:nth-child(4)"

anti_crawl:
  detected: false
  status: "normal"

filters:
  min_title_length: 10

extractor: "infoq"  # 需要自定义提取器处理按天分组的结构
